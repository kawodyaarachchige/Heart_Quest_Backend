<div class="auth-page page-with-glow" autocomplete="off">
  <div class="page-glow page-glow--accent" aria-hidden="true"></div>
  
  <div class="logo-wrap">
    <img src="assets/heart-girl.png" alt="" class="auth-logo" />
  </div>
  <div class="auth-tabs">
    <button type="button" class="auth-tab" [class.active]="isLogin()" (click)="isLogin() || toggleMode()">Login</button>
    <button type="button" class="auth-tab" [class.active]="!isLogin()" (click)="!isLogin() || toggleMode()">Sign Up</button>
  </div>
  @if (isLogin()) {
    <section class="welcome">
      <h1 class="welcome-title">Welcome Back!</h1>
      <p class="motivation">Keep your streak going. One puzzle at a time.</p>
    </section>

    <section class="form-section game-panel">
      <div class="field">
        <label for="login-email">Username</label>
        <input
          id="login-email"
          type="text"
          [(ngModel)]="email"
          placeholder="Enter your email"
          autocomplete="off"
          readonly
          (focus)="onAuthInputFocus($event)"
        />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <div class="input-wrap">
          <input
            id="login-password"
            [type]="hidePassword ? 'password' : 'text'"
            [(ngModel)]="password"
            placeholder="Enter your password"
            autocomplete="off"
            readonly
            (focus)="onAuthInputFocus($event)"
          />
          <button type="button" class="icon-btn" (click)="togglePassword()" [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'">
            {{ hidePassword ? '👁' : '👁‍🗨' }}
          </button>
        </div>
      </div>
      <a class="forgot" routerLink="/auth/forgot-password">Forgot Password?</a>
      @if (errorMsg) {
        <div class="err">{{ errorMsg }}</div>
      }
      <button type="button" class="btn-primary full" (click)="login()" [disabled]="loading">
        {{ loading ? 'Signing in…' : 'Login' }}
      </button>
      <p class="bottom-link">
        Don't have an account? <a (click)="toggleMode()">Sign up</a>
      </p>
    </section>
  } @else {
    <section class="welcome signup-header">
      <h1 class="welcome-title">Create Account</h1>
      <p class="motivation">Join the challenge. Train your brain.</p>
    </section>

    <section class="form-section game-panel">
      <div class="field">
        <label for="signup-username">Username</label>
        <input
          id="signup-username"
          type="text"
          [(ngModel)]="username"
          placeholder="Choose a username"
          autocomplete="off"
          readonly
          (focus)="onAuthInputFocus($event)"
        />
      </div>
      <div class="field">
        <label for="signup-email">Email</label>
        <input
          id="signup-email"
          type="email"
          placeholder="your@email.com"
          autocomplete="off"
          readonly
          (focus)="onAuthInputFocus($event)"
        />
      </div>
      <div class="field">
        <label for="signup-password">Password</label>
        <div class="input-wrap">
          <input
            id="signup-password"
            [type]="hideSignupPassword ? 'password' : 'text'"
            [(ngModel)]="password"
            placeholder="Create a password"
            autocomplete="off"
            readonly
            (focus)="onAuthInputFocus($event)"
          />
          <button type="button" class="icon-btn" (click)="toggleSignupPassword()" [attr.aria-label]="hideSignupPassword ? 'Show password' : 'Hide password'">
            {{ hideSignupPassword ? '👁' : '👁‍🗨' }}
          </button>
        </div>
      </div>
      <div class="field">
        <label for="signup-confirm">Confirm Password</label>
        <div class="input-wrap">
          <input
            id="signup-confirm"
            [type]="hideConfirmPassword ? 'password' : 'text'"
            [(ngModel)]="confirmPassword"
            placeholder="Confirm password"
            autocomplete="off"
            readonly
            (focus)="onAuthInputFocus($event)"
          />
          <button type="button" class="icon-btn" (click)="toggleConfirmPassword()" [attr.aria-label]="hideConfirmPassword ? 'Show password' : 'Hide password'">
            {{ hideConfirmPassword ? '👁' : '👁‍🗨' }}
          </button>
        </div>
      </div>
      <label class="checkbox-wrap">
        <input type="checkbox" [(ngModel)]="acceptTerms" />
        <span>I agree to the Terms & Conditions</span>
      </label>
      @if (errorMsg) {
        <div class="err">{{ errorMsg }}</div>
      }
      <button type="button" class="btn-primary full" (click)="signup()" [disabled]="loading">
        {{ loading ? 'Creating account…' : 'Sign Up' }}
      </button>
      <p class="bottom-link">
        Already have an account? <a (click)="toggleMode()">Login</a>
      </p>
    </section>
  }
</div>
