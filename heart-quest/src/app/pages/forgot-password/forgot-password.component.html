<div class="forgot-page page-with-glow">
  <div class="page-glow page-glow--accent" aria-hidden="true"></div>

  <div class="forgot-content" style="position: relative; z-index: 1">
    <section class="form-section game-panel">
      <h1 class="forgot-title">Reset password</h1>

      @if (step === 1) {
        <p class="forgot-desc">Enter the <strong>exact same username</strong> you use to log in. We’ll let you set a new password.</p>
        <div class="field">
          <label for="forgot-username">Username</label>
          <input
            id="forgot-username"
            type="text"
            [(ngModel)]="username"
            placeholder="Enter your username"
            autocomplete="username"
            (keyup.enter)="continueToStep2()"
          />
        </div>
        @if (message) {
          <div class="err">{{ message }}</div>
        }
        <button type="button" class="btn-primary full" (click)="continueToStep2()">
          Continue
        </button>
      } @else if (step === 2) {
        <p class="forgot-desc">Set a new password for <strong>{{ username }}</strong>.</p>
        <div class="field">
          <label for="forgot-new-password">New password</label>
          <div class="input-wrap">
            <input
              id="forgot-new-password"
              [type]="hideNewPassword ? 'password' : 'text'"
              [(ngModel)]="newPassword"
              placeholder="At least 4 characters"
              autocomplete="new-password"
              (keyup.enter)="resetPassword()"
            />
            <button type="button" class="icon-btn" (click)="toggleNewPassword()" [attr.aria-label]="hideNewPassword ? 'Show password' : 'Hide password'">
              {{ hideNewPassword ? '👁' : '👁‍🗨' }}
            </button>
          </div>
        </div>
        <div class="field">
          <label for="forgot-confirm">Confirm password</label>
          <div class="input-wrap">
            <input
              id="forgot-confirm"
              [type]="hideConfirmPassword ? 'password' : 'text'"
              [(ngModel)]="confirmPassword"
              placeholder="Confirm new password"
              autocomplete="new-password"
              (keyup.enter)="resetPassword()"
            />
            <button type="button" class="icon-btn" (click)="toggleConfirmPassword()" [attr.aria-label]="hideConfirmPassword ? 'Show password' : 'Hide password'">
              {{ hideConfirmPassword ? '👁' : '👁‍🗨' }}
            </button>
          </div>
        </div>
        @if (message) {
          <div class="err">{{ message }}</div>
        }
        <button type="button" class="btn-primary full" (click)="resetPassword()" [disabled]="loading">
          {{ loading ? 'Resetting…' : 'Reset password' }}
        </button>
        <button type="button" class="btn-secondary full" (click)="step = 1; message = null">← Change username</button>
      } @else {
        <div class="forgot-result forgot-result--success">
          <p>{{ message }}</p>
        </div>
        <button type="button" class="btn-primary full" (click)="backToLogin()">Back to login</button>
      }

      <p class="bottom-link">
        <a routerLink="/auth">← Back to login</a>
      </p>
    </section>
  </div>
</div>
